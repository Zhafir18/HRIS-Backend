name: Deploy Backend (Docker)

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Mengubah nama repository menjadi lowercase agar tidak error saat build
      - name: Lowercase Repo Name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Lowercase Repo Name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: zhafirghiffari
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            # Login ke GHCR di dalam VPS
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Tarik image terbaru yang sudah lowercase
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            
            # Hentikan kontainer lama jika ada
            docker stop hris-backend || true
            docker rm hris-backend || true
            
            # Jalankan kontainer baru
            # Pastikan --network internal_network sudah dibuat di VPS via SSH
            docker run -d \
              --name hris-backend \
              --network internal_network \
              -p 5000:5000 \
              --restart always \
              -e DB_HOST=postgres_db \
              -e DB_PORT=5432 \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e DB_DATABASE=hris_db \
              -e JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
              -e CORS_ORIGIN=${{ secrets.CORS_ORIGIN }} \
              -e TZ=Asia/Jakarta \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            
            # Hapus image lama (Dangling images) agar hemat disk VPS
            docker image prune -f
            docker logout ghcr.io